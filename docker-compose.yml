services:
  postgres:
    image: postgres:16-alpine
    container_name: toeic_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: toeic
      POSTGRES_PASSWORD: toeic
      POSTGRES_DB: toeic
    ports:
      - "5432:5432"
    volumes:
      - toeic_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toeic -d toeic"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: toeic_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # NestJS API. Reuses backend/.env, overriding only what differs inside the
  # compose network (DB host/port, Redis). Applies migrations on start.
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: toeic_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    ports:
      - "3000:3000"
    volumes:
      - toeic_uploads:/app/backend/uploads

  # React SPA served by nginx; reverse-proxies /api to the backend so the UI
  # works over any host/IP. Reach it at http://<server-ip>:8080
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
    container_name: toeic_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

  # Python question-extraction worker (consumes jobs from Redis).
  # Build/run with: docker compose --profile extraction up -d extraction-worker
  extraction-worker:
    build: ./extraction-service
    container_name: toeic_extraction_worker
    restart: unless-stopped
    profiles: ["extraction"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      EXTRACTION_QUEUE: extraction:jobs
      # NestJS API as seen from inside the compose network:
      BACKEND_BASE_URL: http://backend:3000/api
      INTERNAL_API_TOKEN: dev-internal-token-change-me
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: http://192.168.100.158:11434
      # 3B model fits the host's 4GB GPU (GTX 1650) fully in VRAM; llama3 (8B,
      # ~5.3GB) did not and ran CPU-only (~45-60 min/doc).
      OLLAMA_MODEL: qwen2.5:14b
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  toeic_pgdata:
  toeic_uploads:
