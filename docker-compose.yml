services:
  postgres:
    image: postgres:16-alpine
    container_name: toeic_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: toeic
      POSTGRES_PASSWORD: toeic
      POSTGRES_DB: toeic
    ports:
      - "5432:5432"
    volumes:
      - toeic_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toeic -d toeic"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: toeic_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # NestJS API. Reuses backend/.env, overriding only what differs inside the
  # compose network (DB host/port, Redis). Applies migrations on start.
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: toeic_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      # Refresh-token cookie Secure flag. Keep false when serving over plain HTTP
      # (http://<host>:8080) or the browser drops the cookie and sessions are lost
      # on refresh. Set true only behind HTTPS/TLS.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # Default extraction provider for new jobs — keep in sync with the worker's
      # LLM_PROVIDER via the repo-root .env (ollama | claude | openai).
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      # Synchronous vocab generation (English Learning KG, P1) calls Ollama from
      # the backend. From inside the container, the host's Ollama is reachable via
      # host.docker.internal (override OLLAMA_BASE_URL in .env for a remote host).
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
    ports:
      - "3000:3000"
    volumes:
      - toeic_uploads:/app/backend/uploads
      # Read-only .env for the admin Configuration page (secrets masked in the API).
      - ./.env:/app/.env:ro

  # React SPA served by nginx; reverse-proxies /api to the backend so the UI
  # works over any host/IP. Reach it at http://<server-ip>:8080
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
        # Social login: set these in the repo-root .env to show the real
        # Google/Facebook buttons (empty → buttons render disabled).
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        VITE_FACEBOOK_APP_ID: ${VITE_FACEBOOK_APP_ID:-}
    container_name: toeic_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

  # Python question-extraction worker (consumes jobs from Redis).
  # Build/run with: docker compose --profile extraction up -d extraction-worker
  extraction-worker:
    build: ./extraction-service
    container_name: toeic_extraction_worker
    restart: unless-stopped
    profiles: ["extraction"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      EXTRACTION_QUEUE: extraction:jobs
      # NestJS API as seen from inside the compose network:
      BACKEND_BASE_URL: http://backend:3000/api
      INTERNAL_API_TOKEN: dev-internal-token-change-me
      # Provider: "ollama" (default, local) | "claude" | "openai".
      # Override these in a .env file at the repo root (gitignored) — e.g.
      #   LLM_PROVIDER=claude
      #   ANTHROPIC_API_KEY=sk-ant-...
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      # OLLAMA_BASE_URL: http://192.168.100.158:11434
      # OLLAMA_BASE_URL: http://host.docker.internal:11434
      # 3B model fits the host's 4GB GPU (GTX 1650) fully in VRAM; llama3 (8B,
      # ~5.3GB) did not and ran CPU-only (~45-60 min/doc).
      # OLLAMA_MODEL: qwen2.5:14b
      OLLAMA_MODEL: qwen2.5:3b
      # Claude (Anthropic) — set the key in .env to use LLM_PROVIDER=claude.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-8}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Live LLM config: edit the repo-root .env and the next job picks it up
      # (provider/model/key are re-read per job) — no rebuild or restart needed.
      - ./.env:/app/.env:ro

volumes:
  toeic_pgdata:
  toeic_uploads:
