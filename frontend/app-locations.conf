# Shared app config — included by both the HTTP (:80) and HTTPS (:443) servers
# so the proxy/SPA rules stay in one place.

# Allow large PDF/DOCX uploads through the proxy (matches API limit).
client_max_body_size 50m;

# Reverse-proxy the API to the backend container — keeps the browser
# same-origin, so cookies work and there is no CORS regardless of the IP/scheme
# used to reach the UI.
location /api/ {
    proxy_pass http://backend:3000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # A first-time vocabulary lookup generates 10+ example sentences via the LLM
    # and can take well over nginx's default 60s.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}

# Hashed build assets (index-<hash>.js/css) are content-addressed → cache forever.
location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# SPA fallback — client-side routing handles unknown paths. index.html must
# never be cached: it points at the hashed assets.
location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
}
