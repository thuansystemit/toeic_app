server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large PDF/DOCX uploads through the proxy (matches API limit).
    client_max_body_size 50m;

    # Reverse-proxy the API to the backend container — keeps the browser
    # same-origin, so cookies work and there is no CORS regardless of the IP
    # used to reach the UI.
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # A first-time vocabulary lookup generates 10+ example sentences via the
        # LLM and can take well over nginx's default 60s. Allow long responses so
        # the request isn't 504'd while the backend is still generating.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Hashed build assets (index-<hash>.js/css) are content-addressed, so they
    # can be cached forever — a new build produces a new filename.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — let client-side routing handle unknown paths. index.html
    # must NEVER be cached: it points at the hashed assets, so a stale copy
    # would keep loading an old JS bundle after a rebuild.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
