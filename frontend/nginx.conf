# HTTP (:80) and HTTPS (:443) both serve the SPA + proxy /api. The HTTPS cert is
# a self-signed cert generated in the Dockerfile (local/dev) — browsers show a
# one-time "not secure" warning you accept. Both schemes stay enabled so the app
# works at http://<host>:8080 and https://<host>:8443.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/app-locations.conf;
}

server {
    listen 443 ssl;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    include /etc/nginx/app-locations.conf;
}
