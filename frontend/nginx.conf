server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large PDF/DOCX uploads through the proxy (matches API limit).
    client_max_body_size 50m;

    # Reverse-proxy the API to the backend container — keeps the browser
    # same-origin, so cookies work and there is no CORS regardless of the IP
    # used to reach the UI.
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — let client-side routing handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
